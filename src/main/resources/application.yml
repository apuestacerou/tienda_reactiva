spring:
  application:
    name: reactiva
  r2dbc:
    url: r2dbc:h2:mem:///tienda?options=DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

server:
  port: 8080

tienda:
  uploads:
    dir: ${user.dir}/uploads/productos
  public-files-base: /api/files
  jwt:
    secret: ${TIENDA_JWT_SECRET:esta-clave-secreta-debe-tener-al-menos-32-bytes-para-hs256-seguro}
    expiration-ms: 86400000
