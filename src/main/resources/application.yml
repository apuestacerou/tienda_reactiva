spring:
  application:
    name: reactiva
  # Solo Neon (PostgreSQL R2DBC). Sin H2 ni base en memoria.
  # Credenciales: application-local.yml junto al pom.xml (plantilla: application-local.yml.example).
  config:
    import: optional:file:./application-local.yml

server:
  port: 8080

tienda:
  uploads:
    dir: ${user.dir}/uploads/productos
  public-files-base: /api/files
  jwt:
    secret: ${TIENDA_JWT_SECRET:esta-clave-secreta-debe-tener-al-menos-32-bytes-para-hs256-seguro}
    expiration-ms: 86400000
