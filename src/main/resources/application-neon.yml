# Perfil: spring.profiles.active=neon
# Definir SIEMPRE las variables en el entorno (no commitear secretos).
#
# JDBC de Neon (referencia):
#   postgresql://USUARIO:CLAVE@HOST/neondb?sslmode=require
# Equivalente R2DBC (sin usuario/clave en la URL; van aparte):
#   r2dbc:postgresql://HOST:5432/neondb?sslmode=require
#
# PowerShell (sesión actual):
#   $env:SPRING_PROFILES_ACTIVE="neon"
#   $env:NEON_R2DBC_URL="r2dbc:postgresql://ep-XXXX.region.aws.neon.tech:5432/neondb?sslmode=require"
#   $env:NEON_R2DBC_USERNAME="neondb_owner"
#   $env:NEON_R2DBC_PASSWORD="(tu contraseña de Neon)"
#   .\mvnw-local.cmd spring-boot:run

spring:
  config:
    activate:
      on-profile: neon
  r2dbc:
    url: ${NEON_R2DBC_URL}
    username: ${NEON_R2DBC_USERNAME}
    password: ${NEON_R2DBC_PASSWORD}
